services:
  frontend:
    image: nginx:1.27-alpine
    container_name: trabajos-frontend
    ports:
      - "127.0.0.1:5173:80"
    volumes:
      - ./nexo-front/dist:/usr/share/nginx/html:ro
      - ./nexo-front/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api-gateway:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: trabajos-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trabajos_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD debe definirse en .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-trabajos_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: trabajos-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-trabajos}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS debe definirse en .env}
    ports:
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: trabajos-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: trabajos-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin123}
      KC_HTTP_PORT: 8080
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8081}
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - ./Backend/keycloak/nexojobs-realm.json:/opt/keycloak/data/import/nexojobs-realm.json:ro

  backend-python:
    build:
      context: ./Backend/BackendPython
    container_name: trabajos-backend-python
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY debe definirse en .env}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,backend-python,notifier,api-gateway}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD debe definirse en .env}@postgres:5432/${POSTGRES_DB:-trabajos_db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY debe definirse en .env}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_MINUTES: ${JWT_ACCESS_TOKEN_MINUTES:-60}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY debe definirse en .env}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-trabajos}:${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS debe definirse en .env}@rabbitmq:5672/
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-job_events}
      REDIS_URL: redis://redis:6379/0
      ENABLE_BACKGROUND_WORKERS: "False"
      SEED_DEMO_DATA: "True"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_demo &&
             python manage.py runserver 0.0.0.0:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 8

  api-gateway:
    build:
      context: ./Backend/api-gateway
    container_name: trabajos-api-gateway
    environment:
      PORT: 8080
      BACKEND_SERVICE_URL: http://backend-python:8000
      NOTIFIER_SERVICE_URL: http://notifier:8001
      COURSES_SERVICE_URL: http://courses-service:3002
      KEYCLOAK_ISSUER_URL: ${KEYCLOAK_ISSUER_URL:-http://localhost:8081/realms/nexojobs}
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/nexojobs/protocol/openid-connect/certs
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-nexojobs-front}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY debe definirse en .env}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      backend-python:
        condition: service_healthy
      notifier:
        condition: service_started
      courses-service:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 8

  courses-service:
    build:
      context: ./Backend/courses-service
    container_name: trabajos-courses-service
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD debe definirse en .env}@postgres:5432/${POSTGRES_DB:-trabajos_db}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/api/v1/courses/health/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 8

  notifier:
    build:
      context: ./Backend/BackendPython
    container_name: trabajos-notifier
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY debe definirse en .env}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,backend-python,notifier,api-gateway}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000,http://localhost:8001,http://127.0.0.1:8001}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD debe definirse en .env}@postgres:5432/${POSTGRES_DB:-trabajos_db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY debe definirse en .env}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_MINUTES: ${JWT_ACCESS_TOKEN_MINUTES:-60}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY debe definirse en .env}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-trabajos}:${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS debe definirse en .env}@rabbitmq:5672/
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-job_events}
      REDIS_URL: redis://redis:6379/0
      ENABLE_BACKGROUND_WORKERS: "False"
      SEED_DEMO_DATA: "False"
    depends_on:
      backend-python:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application

  outbox-worker:
    build:
      context: ./Backend/BackendPython
    container_name: trabajos-outbox-worker
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY debe definirse en .env}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,backend-python,notifier,api-gateway}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD debe definirse en .env}@postgres:5432/${POSTGRES_DB:-trabajos_db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY debe definirse en .env}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_MINUTES: ${JWT_ACCESS_TOKEN_MINUTES:-60}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY debe definirse en .env}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-trabajos}:${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS debe definirse en .env}@rabbitmq:5672/
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-job_events}
      REDIS_URL: redis://redis:6379/0
      ENABLE_BACKGROUND_WORKERS: "False"
      SEED_DEMO_DATA: "False"
    depends_on:
      backend-python:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: python manage.py run_outbox_dispatcher

  java-consumer:
    build:
      context: ./Backend/java-consumer
    container_name: trabajos-java-consumer
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER:-trabajos}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS debe definirse en .env}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-job_events}
      RABBITMQ_PREFETCH_COUNT: ${RABBITMQ_PREFETCH_COUNT:-10}
      THREAD_POOL_SIZE: ${THREAD_POOL_SIZE:-10}
      PROCESSING_DELAY_MS: ${PROCESSING_DELAY_MS:-5000}
      CPU_BURN_MS: ${CPU_BURN_MS:-0}
      PYTHON_API_BASE_URL: http://backend-python:8000/api/v1
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY debe definirse en .env}
    depends_on:
      backend-python:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
  rabbitmq_data:
