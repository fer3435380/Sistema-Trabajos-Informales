services:
  postgres:
    image: postgres:16-alpine
    container_name: trabajos-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trabajos_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-trabajos_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: trabajos-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-trabajos}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-trabajos123}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-python:
    build:
      context: ./Backend/BackendPython
    container_name: trabajos-backend-python
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-django-secret}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-trabajos_db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret-change-me-32-bytes!}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_MINUTES: ${JWT_ACCESS_TOKEN_MINUTES:-1440}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-trabajos}:${RABBITMQ_DEFAULT_PASS:-trabajos123}@rabbitmq:5672/
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-job_events}
      ENABLE_BACKGROUND_WORKERS: "False"
      SEED_DEMO_DATA: "True"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_demo &&
             python manage.py runserver 0.0.0.0:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 8

  outbox-worker:
    build:
      context: ./Backend/BackendPython
    container_name: trabajos-outbox-worker
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-django-secret}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-trabajos_db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret-change-me-32-bytes!}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_MINUTES: ${JWT_ACCESS_TOKEN_MINUTES:-1440}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-trabajos}:${RABBITMQ_DEFAULT_PASS:-trabajos123}@rabbitmq:5672/
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-job_events}
      ENABLE_BACKGROUND_WORKERS: "False"
      SEED_DEMO_DATA: "False"
    depends_on:
      backend-python:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: python manage.py run_outbox_dispatcher

volumes:
  postgres_data:
  rabbitmq_data:
