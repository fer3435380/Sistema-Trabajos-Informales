apiVersion: v1
kind: ConfigMap
metadata:
  name: trabajos-config
  namespace: trabajos
data:
  DJANGO_DEBUG: "False"
  ALLOWED_HOSTS: "*"
  CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173"
  CSRF_TRUSTED_ORIGINS: "http://localhost:8000,http://127.0.0.1:8000"
  JWT_ALGORITHM: "HS256"
  JWT_ACCESS_TOKEN_MINUTES: "60"
  POSTGRES_DB: "trabajos_db"
  POSTGRES_USER: "postgres"
  RABBITMQ_DEFAULT_USER: "trabajos"
  RABBITMQ_QUEUE: "job_events"
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: "trabajos"
  RABBITMQ_PREFETCH_COUNT: "10"
  THREAD_POOL_SIZE: "10"
  PROCESSING_DELAY_MS: "0"
  CPU_BURN_MS: "750"
  REDIS_URL: "redis://redis:6379/0"
  PYTHON_API_BASE_URL: "http://backend-python:8000/api/v1"
  BACKEND_SERVICE_URL: "http://backend-python:8000"
  NOTIFIER_SERVICE_URL: "http://notifier:8001"
  COURSES_SERVICE_URL: "http://courses-service:3002"
  COURSES_SERVICE_PORT: "3002"
  PORT: "8080"
  KEYCLOAK_PUBLIC_URL: "http://keycloak:8080"
  KEYCLOAK_ISSUER_URL: "http://keycloak:8080/realms/nexojobs"
  KEYCLOAK_JWKS_URL: "http://keycloak:8080/realms/nexojobs/protocol/openid-connect/certs"
  KEYCLOAK_CLIENT_ID: "nexojobs-front"
