apiVersion: apps/v1
kind: Deployment
metadata:
  name: courses-service
  namespace: trabajos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: courses-service
  template:
    metadata:
      labels:
        app: courses-service
    spec:
      containers:
        - name: courses-service
          image: trabajos-courses-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: trabajos-config
                  key: COURSES_SERVICE_PORT
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: trabajos-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: trabajos-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trabajos-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            httpGet:
              path: /api/v1/courses/health/
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: courses-service
  namespace: trabajos
spec:
  type: ClusterIP
  selector:
    app: courses-service
  ports:
    - port: 3002
      targetPort: 3002
