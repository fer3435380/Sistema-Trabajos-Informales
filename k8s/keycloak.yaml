    {
      "realm": "nexojobs",
      "enabled": true,
      "displayName": "NexoJobs",
      "roles": {
        "realm": [
          { "name": "worker", "description": "Trabajador" },
          { "name": "owner", "description": "Empresa / duenio" },
          { "name": "admin", "description": "Administrador" }
