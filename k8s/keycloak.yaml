        {
          "username": "operaciones@eventosaustro.ec",
          "email": "operaciones@eventosaustro.ec",
          "firstName": "Eventos",
          "lastName": "Austro",
          "enabled": true,
          "emailVerified": true,
          "credentials": [
            { "type": "password", "value": "empresa123", "temporary": false }
          ],
          "realmRoles": ["owner"]
        },
        {
          "username": "admin@nexojobs.ec",
          "email": "admin@nexojobs.ec",
          "firstName": "Admin",
          "lastName": "NexoJobs",
          "enabled": true,
          "emailVerified": true,
          "credentials": [
            { "type": "password", "value": "Admin123!", "temporary": false }
          ],
          "realmRoles": ["admin"]
        }
